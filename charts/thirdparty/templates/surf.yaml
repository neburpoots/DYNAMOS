apiVersion: apps/v1
kind: Deployment
metadata:
  name: surf
  namespace: {{ .Values.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surf
  template:
    metadata:
      labels:
        app: surf
        component: agent-service
      annotations:
        "linkerd.io/inject" : enabled
    spec:
      serviceAccountName: job-creator-surf
      containers:
      - name: surf
        image: {{ .Values.dockerArtifactAccount }}/agent:{{ .Values.branchNameTag }}
        imagePullPolicy: {{ .Values.imagePullPolicy | default "Always" }}
        ports:
        - containerPort: 8080
        env:
        - name: DATA_STEWARD_NAME
          value: SURF
        - name: OC_AGENT_HOST
          value: {{ .Values.tracingEndpoint }}
        - name: SQL_STREAM_BATCH_ROWS
          value: {{ .Values.sqlStreamBatchRows | default "5000" | quote }}
        - name: AGENT_HTTP_TIMEOUT
          value: {{ .Values.httpTimeout | default "30s" | quote }}
        - name: AGENT_HTTP_STREAM_TIMEOUT
          value: {{ .Values.httpStreamTimeout | default "20m" | quote }}
        - name: MICROSERVICE_REPOSITORY_NAME
          value: {{ .Values.dockerArtifactAccount | quote }}
        - name: SIDECAR_REPOSITORY_NAME
          value: {{ .Values.dockerArtifactAccount | quote }}
        - name: MICROSERVICE_TAG
          value: {{ .Values.branchNameTag | quote }}
        - name: SIDECAR_TAG
          value: {{ .Values.branchNameTag | quote }}
        - name: MICROSERVICE_IMAGE_PULL_POLICY
          value: {{ .Values.imagePullPolicy | default "Always" | quote }}
        - name: SIDECAR_IMAGE_PULL_POLICY
          value: {{ .Values.imagePullPolicy | default "Always" | quote }}
      - name: sidecar
        image: {{ .Values.dockerArtifactAccount }}/sidecar:{{ .Values.branchNameTag }}
        imagePullPolicy: {{ .Values.imagePullPolicy | default "Always" }}
        env:
        - name: AMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbit
              key: password
        - name: AMQ_USER
          value: normal_user
        - name: OC_AGENT_HOST
          value: {{ .Values.tracingEndpoint }}
        - name: RABBITMQ_STREAM_CHUNK_ROWS
          value: {{ .Values.rabbitmqStreamChunkRows | default "100" | quote }}
        - name: RABBITMQ_STREAM_CHUNK_BYTES
          value: {{ .Values.rabbitmqStreamChunkBytes | default "65536" | quote }}

---

apiVersion: v1
kind: Service
metadata:
  name: surf
  namespace:  {{ .Values.Namespace }}
spec:
  selector:
    app: surf
    component: agent-service
  ports:
    - name: http-surf-api
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surf-ingress
  namespace: {{ .Values.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/service-upstream: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: surf.surf.svc.cluster.local
    http:
      paths:
      - pathType: Prefix
        path: "/agent/v1/sqlDataRequest/surf"
        backend:
          service:
            name: surf
            port:
              number: 8080
