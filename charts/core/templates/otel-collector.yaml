apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamos-otel-collector
  namespace: linkerd-jaeger
data:
  collector.yaml: |
    receivers:
      opencensus:
        endpoint: 0.0.0.0:55678
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlp/jaeger:
        endpoint: jaeger.linkerd-jaeger.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [opencensus, otlp]
          exporters: [otlp/jaeger]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamos-otel-collector
  namespace: linkerd-jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamos-otel-collector
      component: collector
  template:
    metadata:
      labels:
        app: dynamos-otel-collector
        component: collector
      annotations:
        "linkerd.io/inject": disabled
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.69.0
        args:
        - --config=/conf/collector.yaml
        ports:
        - name: opencensus
          containerPort: 55678
        - name: otlp-grpc
          containerPort: 4317
        - name: otlp-http
          containerPort: 4318
        volumeMounts:
        - name: collector-config
          mountPath: /conf
      volumes:
      - name: collector-config
        configMap:
          name: dynamos-otel-collector

---
apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: linkerd-jaeger
spec:
  ports:
  - name: opencensus
    port: 55678
    targetPort: 55678
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  selector:
    component: collector
